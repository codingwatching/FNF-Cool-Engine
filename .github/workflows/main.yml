# ────────────────────────────────────────────────────────────────────────────
# Cool Engine — CI/CD Build Pipeline
# ────────────────────────────────────────────────────────────────────────────
name: Build Cool Engine

on:
  push:         { branches: [main, master] }
  pull_request: { branches: [main, master] }
  workflow_dispatch:

env:
  HAXE_VERSION:   "4.3.6"
  LIME_VERSION:   "8.3.1"
  OPENFL_VERSION: "9.3.0"

jobs:

  # ══════════════════════════════════════════════════════════════════════════
  # WINDOWS
  # ══════════════════════════════════════════════════════════════════════════
  build-windows:
    name: "Build — Windows"
    runs-on: windows-latest
    steps:
      # Anchors are defined here (first job) and reused by reference in later jobs.
      - &checkout
        uses: actions/checkout@v4
        with: { submodules: recursive }

      - &setup-haxe
        name: Install Haxe ${{ env.HAXE_VERSION }}
        uses: krdlab/setup-haxe@v1
        with: { haxe-version: "${{ env.HAXE_VERSION }}" }

      - name: Install MSVC build tools
        uses: microsoft/setup-msbuild@v2

      - name: Install haxelibs
        shell: bash
        run: |
          haxelib setup C:/haxelib
          echo "HAXELIB_PATH=C:/haxelib" >> $GITHUB_ENV
          haxelib install hxcpp                                                  --quiet --never
          haxelib install lime          ${{ env.LIME_VERSION }}                  --never
          haxelib install openfl        ${{ env.OPENFL_VERSION }}                --never
          haxelib install flixel        6.1.2                                    --never
          haxelib install flixel-addons 4.0.1                                    --never
          haxelib git    coolui    https://github.com/The-Cool-Engine-Crew/coolui --never
          haxelib install flixel-tools  1.5.1  --quiet --never
          haxelib install actuate               --quiet --never
          haxelib install hscript               --quiet --never
          haxelib install format                --quiet --never
          haxelib install hxp                   --quiet --never
          haxelib install linc_luajit           --quiet --never
          haxelib git discord_rpc    https://github.com/Aidan63/linc_discord-rpc       --never
          haxelib git flixel-animate https://github.com/MaybeMaru/flixel-animate  main --never
          haxelib git funkin.vis     https://github.com/FunkinCrew/funkVis             --never
          haxelib git hxvlc          https://github.com/MAJigsaw77/hxvlc.git           --never

      - &lock-versions
        name: Lock library versions
        shell: bash
        run: |
          haxelib set lime          ${{ env.LIME_VERSION }}
          haxelib set openfl        ${{ env.OPENFL_VERSION }}
          haxelib set flixel        6.1.2
          haxelib set flixel-addons 4.0.1

      - &setup-lime
        name: Setup Lime
        shell: bash
        run: haxelib run lime setup -y

      - name: Build (Windows release)
        shell: cmd
        run: haxelib run lime build windows -final

      - name: Upload Windows build
        uses: actions/upload-artifact@v4
        with:
          name: CoolEngine-Windows
          path: export/release/windows/bin/
          if-no-files-found: error

  # ══════════════════════════════════════════════════════════════════════════
  # macOS (arm64)
  # ══════════════════════════════════════════════════════════════════════════
  build-macos:
    name: "Build — macOS"
    runs-on: macos-14
    steps:
      - *checkout

      - name: Remove pre-installed Haxe
        run: |
          sudo rm -rf /Users/runner/hostedtoolcache/haxe || true
          sudo rm -f  /usr/local/bin/haxe /usr/local/bin/haxelib || true

      - name: Install Neko
        run: |
          brew install neko
          sudo mkdir -p /usr/local/lib
          sudo ln -sf "$(brew --prefix neko)/lib/libneko.2.dylib" /usr/local/lib/libneko.2.dylib

      - name: Install Haxe ${{ env.HAXE_VERSION }}
        run: |
          curl -fsSL "https://github.com/HaxeFoundation/haxe/releases/download/${{ env.HAXE_VERSION }}/haxe-${{ env.HAXE_VERSION }}-osx.tar.gz" -o haxe.tar.gz
          tar -xzf haxe.tar.gz
          HAXE_DIR="$(pwd)/$(tar -tzf haxe.tar.gz | head -1 | cut -d/ -f1)"
          echo "$HAXE_DIR" >> "$GITHUB_PATH"
          echo "HAXE_STD_PATH=$HAXE_DIR/std" >> "$GITHUB_ENV"
          mkdir -p ~/haxelib
          "$HAXE_DIR/haxelib" setup ~/haxelib
          rm haxe.tar.gz

      - name: Install libvlc
        run: brew install --cask vlc

      - name: Install haxelibs
        run: |
          haxelib install hxcpp                                                  --quiet --never
          haxelib install lime          ${{ env.LIME_VERSION }}                  --never
          haxelib install openfl        ${{ env.OPENFL_VERSION }}                --never
          haxelib install flixel        6.1.2                                    --never
          haxelib install flixel-addons 4.0.1                                    --never
          haxelib git    coolui    https://github.com/The-Cool-Engine-Crew/coolui --never
          haxelib install flixel-tools  1.5.1  --quiet --never
          haxelib install actuate               --quiet --never
          haxelib install hscript               --quiet --never
          haxelib install format                --quiet --never
          haxelib install hxp                   --quiet --never
          haxelib install linc_luajit           --quiet --never
          haxelib git discord_rpc    https://github.com/Aidan63/linc_discord-rpc       --never
          haxelib git flixel-animate https://github.com/MaybeMaru/flixel-animate  main --never
          haxelib git funkin.vis     https://github.com/FunkinCrew/funkVis             --never
          haxelib git hxvlc          https://github.com/MAJigsaw77/hxvlc.git           --never

      - *lock-versions
      - *setup-lime

      - name: Rebuild Lime for arm64
        run: arch -arm64 haxelib run lime rebuild mac

      - name: Build (macOS release)
        run: arch -arm64 haxelib run lime build mac -final

      - name: Upload macOS build
        uses: actions/upload-artifact@v4
        with:
          name: CoolEngine-macOS
          path: export/release/macos/bin/
          if-no-files-found: error

  # ══════════════════════════════════════════════════════════════════════════
  # LINUX
  # ══════════════════════════════════════════════════════════════════════════
  build-linux:
    name: "Build — Linux"
    runs-on: ubuntu-22.04
    steps:
      - *checkout

      - name: Install system dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            libvlc-dev libvlccore-dev vlc-bin \
            libasound2-dev libpulse-dev \
            libgl1-mesa-dev libglu1-mesa-dev \
            libx11-dev libxext-dev libxi-dev \
            libxrandr-dev libxinerama-dev libxcursor-dev \
            libdbus-1-dev g++ gcc make
          sudo ldconfig

      - *setup-haxe

      - name: Install haxelibs
        run: |
          haxelib setup ~/haxelib
          haxelib install hxcpp                                                  --quiet --never
          haxelib install lime          ${{ env.LIME_VERSION }}                  --never
          haxelib install openfl        ${{ env.OPENFL_VERSION }}                --never
          haxelib install flixel        6.1.2                                    --never
          haxelib install flixel-addons 4.0.1                                    --never
          haxelib git    coolui    https://github.com/The-Cool-Engine-Crew/coolui --never
          haxelib install flixel-tools  1.5.1  --quiet --never
          haxelib install actuate               --quiet --never
          haxelib install hscript               --quiet --never
          haxelib install format                --quiet --never
          haxelib install hxp                   --quiet --never
          haxelib install linc_luajit           --quiet --never
          haxelib git discord_rpc    https://github.com/Aidan63/linc_discord-rpc       --never
          haxelib git flixel-animate https://github.com/MaybeMaru/flixel-animate  main --never
          haxelib git funkin.vis     https://github.com/FunkinCrew/funkVis             --never
          haxelib git hxvlc          https://github.com/MAJigsaw77/hxvlc.git           --never

      - *lock-versions
      - *setup-lime

      - name: Build (Linux release)
        run: haxelib run lime build linux -final

      - name: Upload Linux build
        uses: actions/upload-artifact@v4
        with:
          name: CoolEngine-Linux
          path: export/release/linux/bin/
          if-no-files-found: error

  # ══════════════════════════════════════════════════════════════════════════
  # ANDROID
  # ══════════════════════════════════════════════════════════════════════════
  build-android:
    name: "Build — Android"
    runs-on: ubuntu-22.04
    steps:
      - *checkout

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK & build tools
        run: |
          sdkmanager --install \
            "ndk;21.4.7075529" \
            "build-tools;33.0.2" \
            "platforms;android-33" \
            "cmake;3.22.1"
          echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/21.4.7075529" >> $GITHUB_ENV

      - *setup-haxe

      - name: Install haxelibs
        run: |
          haxelib install hxcpp                                                  --quiet --never
          haxelib install lime          ${{ env.LIME_VERSION }}                  --never
          haxelib install openfl        ${{ env.OPENFL_VERSION }}                --never
          haxelib install flixel        6.1.2                                    --never
          haxelib install flixel-addons 4.0.1                                    --never
          haxelib git    coolui    https://github.com/The-Cool-Engine-Crew/coolui --never
          haxelib install flixel-tools  1.5.1  --quiet --never
          haxelib install actuate               --quiet --never
          haxelib install hscript               --quiet --never
          haxelib install format                --quiet --never
          haxelib install hxp                   --quiet --never
          haxelib install linc_luajit           --quiet --never
          haxelib git flixel-animate https://github.com/MaybeMaru/flixel-animate  main --never
          haxelib git funkin.vis     https://github.com/FunkinCrew/funkVis             --never
          haxelib git hxvlc          https://github.com/MAJigsaw77/hxvlc.git           --never
          # discord_rpc omitido: no compatible con Android

      - *lock-versions
      - *setup-lime

      - name: Configure Lime Android paths
        run: |
          mkdir -p ~/.lime
          cat > ~/.lime/config.xml << EOF
          <config>
            <set name="ANDROID_SDK"      value="$ANDROID_SDK_ROOT" />
            <set name="ANDROID_NDK_ROOT" value="$ANDROID_NDK_HOME" />
            <set name="JAVA_HOME"        value="$JAVA_HOME" />
            <set name="ANDROID_SETUP"    value="true" />
          </config>
          EOF

      - name: Build (Android release)
        run: |
          export GRADLE_OPTS="-Xmx4g -Dorg.gradle.jvmargs='-Xmx4g -XX:MaxMetaspaceSize=512m'"
          haxelib run lime build android -final -nosign

      # FIX: sin keystore la APK puede quedar en debug/ o como -unsigned.
      # Buscamos cualquier .apk bajo outputs/ en vez de hardcodear la ruta.
      - name: Locate APK
        run: find export/release/android/bin/app/build/outputs/ -name "*.apk"

      - name: Upload Android build
        uses: actions/upload-artifact@v4
        with:
          name: CoolEngine-Android
          path: export/release/android/bin/app/build/outputs/apk/
          if-no-files-found: error
