<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; style-src 'unsafe-inline'; script-src 'self' 'unsafe-inline';" />
  <title>Cool Engine Launcher</title>
  <style>
    :root {
      --bg:      #0a0a12;
      --surface: #12121e;
      --border:  #2a2a44;
      --accent:  #6b44ff;
      --accent2: #ff4488;
      --text:    #e8e8f8;
      --muted:   #7878a8;
      --green:   #44ffaa;
      --yellow:  #ffdd44;
      --red:     #ff4466;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: 14px;
      height: 100vh;
      overflow: hidden;
      user-select: none;
    }

    /* ── Barra de título custom ─────────────────────────────────────────── */
    #titlebar {
      -webkit-app-region: drag;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      height: 40px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
    }
    #titlebar .title {
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.08em;
      color: var(--accent);
      text-transform: uppercase;
    }
    #titlebar .controls { -webkit-app-region: no-drag; }
    #btn-close {
      background: none;
      border: none;
      color: var(--muted);
      font-size: 20px;
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 4px;
      transition: color 0.15s, background 0.15s;
    }
    #btn-close:hover { color: var(--red); background: rgba(255,68,102,0.1); }

    /* ── Layout ─────────────────────────────────────────────────────────── */
    #app {
      display: flex;
      flex-direction: column;
      height: calc(100vh - 40px);
      padding: 24px;
      gap: 20px;
    }

    /* ── Header ─────────────────────────────────────────────────────────── */
    #header {
      display: flex;
      align-items: center;
      gap: 16px;
    }
    #header .icon {
      width: 56px;
      height: 56px;
      border-radius: 12px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      flex-shrink: 0;
    }
    #header h1 { font-size: 22px; font-weight: 800; }
    #header p  { color: var(--muted); margin-top: 4px; font-size: 13px; }

    /* ── Cards ───────────────────────────────────────────────────────────── */
    #cards { display: flex; flex-direction: column; gap: 12px; flex: 1; overflow-y: auto; }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px 20px;
    }
    .card-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
    }
    .card-header .badge {
      font-size: 11px;
      font-weight: 700;
      padding: 3px 8px;
      border-radius: 6px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    .badge-engine { background: rgba(107,68,255,0.2); color: var(--accent); border: 1px solid var(--accent); }
    .badge-mod    { background: rgba(255,68,136,0.2); color: var(--accent2); border: 1px solid var(--accent2); }

    .card-title { font-size: 15px; font-weight: 700; }

    .version-row {
      display: flex;
      gap: 20px;
      margin-bottom: 10px;
    }
    .version-item label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; }
    .version-item .ver  { font-size: 16px; font-weight: 700; margin-top: 2px; }
    .ver.old   { color: var(--red); }
    .ver.new   { color: var(--green); }
    .ver.arrow { color: var(--muted); font-size: 20px; line-height: 1; padding: 0 4px; }

    .changelog {
      background: rgba(0,0,0,0.3);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 12px;
      color: var(--muted);
      max-height: 100px;
      overflow-y: auto;
      white-space: pre-wrap;
      word-break: break-word;
      line-height: 1.5;
    }

    /* ── Botones ─────────────────────────────────────────────────────────── */
    #actions {
      display: flex;
      gap: 12px;
      justify-content: flex-end;
    }

    .btn {
      padding: 10px 24px;
      border-radius: 8px;
      border: none;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    .btn:active { transform: scale(0.97); }

    .btn-primary {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff;
    }
    .btn-primary:hover { opacity: 0.9; }

    .btn-secondary {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
    }
    .btn-secondary:hover { border-color: var(--muted); }

    /* ── Scrollbar ───────────────────────────────────────────────────────── */
    ::-webkit-scrollbar       { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--muted); }

    /* ── Loading ─────────────────────────────────────────────────────────── */
    #loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex: 1;
      gap: 16px;
      color: var(--muted);
    }
    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <!-- Barra de título -->
  <div id="titlebar">
    <span class="title">⚡ Cool Engine Launcher</span>
    <div class="controls">
      <button id="btn-close" title="Cerrar">✕</button>
    </div>
  </div>

  <!-- Contenido principal -->
  <div id="app">

    <!-- Estado de carga inicial -->
    <div id="loading">
      <div class="spinner"></div>
      <span>Comprobando actualizaciones…</span>
    </div>

    <!-- Se rellena por JS cuando llegan los datos -->
    <div id="content" style="display:none; flex-direction:column; gap:20px; flex:1;">

      <div id="header">
        <div class="icon">🎮</div>
        <div>
          <h1 id="header-title">Actualizaciones disponibles</h1>
          <p id="header-sub">Revisa los cambios antes de continuar</p>
        </div>
      </div>

      <div id="cards"></div>

      <div id="actions">
        <button class="btn btn-secondary" id="btn-skip">Ignorar y jugar</button>
        <button class="btn btn-primary"   id="btn-download">Descargar actualizaciones</button>
      </div>

    </div>
  </div>

  <script>
    const L = window.launcher;

    // Botones de control de ventana
    document.getElementById('btn-close').onclick = () => L.close();
    document.getElementById('btn-skip').onclick  = () => { L.launchGame(); L.close(); };

    // Recibe la info del proceso principal
    L.onUpdateInfo((info) => {
      document.getElementById('loading').style.display  = 'none';
      document.getElementById('content').style.display  = 'flex';

      renderCards(info);
    });

    // ── Renderiza las cards ────────────────────────────────────────────────

    function renderCards(info) {
      const cards = document.getElementById('cards');
      cards.innerHTML = '';

      // Card del engine
      if (info.engineUpdate) {
        const eu = info.engineUpdate;
        cards.appendChild(makeEngineCard(eu));
        document.getElementById('btn-download').onclick = () => {
          L.openUrl(eu.downloadUrl);
        };
      }

      // Cards de mods
      for (const mu of info.modUpdates) {
        cards.appendChild(makeModCard(mu));
      }

      // Si hay múltiples updates, el botón abre la primera
      if (!info.engineUpdate && info.modUpdates.length > 0) {
        document.getElementById('btn-download').onclick = () => {
          L.openUrl(info.modUpdates[0].downloadUrl);
        };
      }

      // Actualizar header
      const total = (info.engineUpdate ? 1 : 0) + info.modUpdates.length;
      document.getElementById('header-title').textContent =
        total === 1 ? '1 actualización disponible' : `${total} actualizaciones disponibles`;
    }

    function makeEngineCard(eu) {
      const el = document.createElement('div');
      el.className = 'card';
      el.innerHTML = `
        <div class="card-header">
          <span class="badge badge-engine">Engine</span>
          <span class="card-title">Cool Engine</span>
        </div>
        <div class="version-row">
          <div class="version-item">
            <label>Versión actual</label>
            <div class="ver old">v${eu.currentVersion}</div>
          </div>
          <div class="version-item">
            <div class="ver arrow">→</div>
          </div>
          <div class="version-item">
            <label>Última versión</label>
            <div class="ver new">v${eu.latestVersion}</div>
          </div>
        </div>
        ${eu.changelog ? `<div class="changelog">${escHtml(eu.changelog.slice(0, 600))}</div>` : ''}
      `;
      return el;
    }

    function makeModCard(mu) {
      const el = document.createElement('div');
      el.className = 'card';
      el.innerHTML = `
        <div class="card-header">
          <span class="badge badge-mod">Mod</span>
          <span class="card-title">${escHtml(mu.modName)}</span>
        </div>
        <div class="version-row">
          <div class="version-item">
            <label>Versión actual</label>
            <div class="ver old">v${escHtml(mu.currentVersion)}</div>
          </div>
          <div class="version-item">
            <div class="ver arrow">→</div>
          </div>
          <div class="version-item">
            <label>Última versión</label>
            <div class="ver new">v${escHtml(mu.latestVersion)}</div>
          </div>
        </div>
        <button class="btn btn-secondary" style="margin-top:8px; padding:6px 14px;"
          onclick="window.launcher.openUrl('${mu.downloadUrl}')">
          Ver en GameBanana ↗
        </button>
      `;
      return el;
    }

    function escHtml(str) {
      return String(str)
        .replace(/&/g,'&amp;').replace(/</g,'&lt;')
        .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }
  </script>
</body>
</html>
